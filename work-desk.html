<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Work Desk — Resume Exploration</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#050508; color:#fff; overflow:hidden; font-family:'Poppins', sans-serif; }
        canvas { display:block; }

        /* HUD Overlay */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        
        #top-bar {
            position: absolute; top: 30px; left: 40px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: #7090ff; opacity: 0.8; }
        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }

        /* Floating Info Box */
        #info-card {
            position: fixed; right: 40px; top: 40px; width: 300px; padding: 25px;
            background: rgba(15, 15, 20, 0.85);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            opacity: 0; transform: translateX(30px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: all;
        }
        #info-card.active { opacity: 1; transform: translateX(0); }
        #info-card h2 { font-size: 18px; margin-bottom: 10px; color: #fff; }
        #info-card p { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 20px; }
        
        .btn-view {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; background: #fff; color: #000;
            border-radius: 30px; font-size: 12px; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }
        .btn-view:hover { transform: translateY(-2px); background: #7090ff; color: #fff; }

        #reset-btn {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
            font-size: 11px; font-weight: 600; color: #fff; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.1em;
            transition: 0.3s; pointer-events: all; opacity: 0;
        }
        #reset-btn.visible { opacity: 1; bottom: 60px; }
        #reset-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

        .hint { position: fixed; bottom: 30px; right: 40px; font-size: 11px; color: rgba(255,255,255,0.3); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="hud">
        <div id="top-bar">
            <span class="tag">Interactive Portfolio v2.0</span>
            <h1>Work Desk Explorer</h1>
        </div>

        <div id="info-card">
            <h2 id="info-title">Topic</h2>
            <p id="info-desc">Description goes here.</p>
            <a href="#" id="view-more" class="btn-view">
                Explore Sector
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
        </div>

        <button id="reset-btn">Reset View</button>
        <div class="hint">Scroll to Zoom • Click to Explore • Drag to Rotate</div>
    </div>

    <!-- Load Three.js and legacy JSM-to-JS examples -->
    <script src="./libs/three.min.js"></script>
    <script src="./libs/tween.umd.js"></script>
    <script src="./libs/OrbitControls.js"></script>
    <script src="./libs/CopyShader.js"></script>
    <script src="./libs/ShaderPass.js"></script>
    <script src="./libs/LuminosityHighPassShader.js"></script>
    <script src="./libs/EffectComposer.js"></script>
    <script src="./libs/RenderPass.js"></script>
    <script src="./libs/UnrealBloomPass.js"></script>

    <script>
        window.onerror = function(msg, src, line, col, err) {
            log('JS ERROR line ' + line + ': ' + msg);
        };
        const _dbg = document.createElement('div');
        _dbg.style.cssText = 'position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.9);color:#0f0;font:12px monospace;padding:12px;z-index:99999;white-space:pre;border:1px solid #0f0;';
        document.body.appendChild(_dbg);
        let _log = '';
        function log(msg) { _log += msg + '\n'; _dbg.textContent = _log; }
        log('Script started');

        // Data Mapping
        const DATA = {
            laptop: { title: "Digital Transformation", desc: "Leading AI integration and digital workflows at MACC. The G14 represents my technical stack.", url: "index.html#impact" },
            notebook: { title: "Professional Experience", desc: "Research Manager at NUS. Managed multimillion-dollar portfolios and clinical governance.", url: "index.html#experience" },
            papers: { title: "Research & Publications", desc: "Co-authored 38+ articles in journals like Brain and Neurology. Focused on clinical markers.", url: "index.html#publications" },
            phone: { title: "Let's Connect", desc: "LinkedIn, Google Scholar, and Contact details are available via the main portal.", url: "index.html#about" }
        };

        log('THREE loaded: ' + (typeof THREE !== 'undefined'));
        log('TWEEN loaded: ' + (typeof TWEEN !== 'undefined'));

        // ─── Setup ──────────────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x04040a);
        scene.fog = new THREE.FogExp2(0x04040a, 0.04);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        log('Canvas size: ' + renderer.domElement.width + 'x' + renderer.domElement.height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.6;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.minDistance = 3;
        controls.maxDistance = 15;

        // ─── Post Processing ───────────────────────────────────────────────────────
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));
        
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.85);
        composer.addPass(bloomPass);

        // ─── Textures ───────────────────────────────────────────────────────────────
        function buildWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a0f08'; ctx.fillRect(0,0,512,512);
            for(let i=0; i<300; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.2})`;
                ctx.fillRect(Math.random()*512, 0, Math.random()*2, 512);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 1);
            return texture;
        }

        function buildKeyboardTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0,0,512,256);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            for(let y=10; y<240; y+=30) for(let x=10; x<490; x+=40) {
                if((x > 50 && x < 150) && (y > 70 && y < 140)) ctx.fillStyle = '#202028'; 
                else ctx.fillStyle = '#111116';
                ctx.fillRect(x,y,35,25); ctx.strokeRect(x,y,35,25);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function buildScreenTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 320;
            const ctx = canvas.getContext('2d');
            const g = ctx.createLinearGradient(0,0,512,320); g.addColorStop(0, '#0a0a20'); g.addColorStop(1, '#201030');
            ctx.fillStyle = g; ctx.fillRect(0,0,512,320);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Poppins'; ctx.fillText('EDDIE CHONG', 50, 150);
            ctx.fillStyle = '#7090ff'; ctx.font = '18px Poppins'; ctx.fillText('Project Manager | AI Integration', 50, 185);
            return new THREE.CanvasTexture(canvas);
        }

        const woodTex = buildWoodTexture();
        const kbTex = buildKeyboardTexture();
        const scrTex = buildScreenTexture();

        // ─── Desk & Room ───────────────────────────────────────────────────────────
        // Materials
        const woodMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.8, metalness: 0.1 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1f, roughness: 0.2, metalness: 0.9 });
        const plasticMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.6, metalness: 0.2 });

        // Desk
        const deskGroup = new THREE.Group();
        const top = new THREE.Mesh(new THREE.BoxGeometry(14, 0.4, 7), woodMat);
        top.position.y = -0.2; top.receiveShadow = true; top.castShadow = true;
        deskGroup.add(top);

        const legGeo = new THREE.BoxGeometry(0.2, 3, 0.2);
        [[-6.5, -3], [-6.5, 3], [6.5, -3], [6.5, 3]].forEach(p => {
            const leg = new THREE.Mesh(legGeo, metalMat);
            leg.position.set(p[0], -1.7, p[1]);
            deskGroup.add(leg);
        });
        scene.add(deskGroup);

        // DIAGNOSTIC TEST: bright emissive sphere - must be visible regardless of lighting
        const testSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        testSphere.position.set(0, 1, 0);
        scene.add(testSphere);

        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x0a0a0e, roughness: 0.9 }));
        floor.rotation.x = -Math.PI / 2; floor.position.y = -3.2; floor.receiveShadow = true;
        scene.add(floor);

        // ─── Laptop (ROG-ish G14) ────────────────────────────────────────────────
        const laptop = new THREE.Group();
        laptop.position.set(-2, 0, 0);
        laptop.userData = { id: 'laptop' };

        const body = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.15, 2.4), metalMat);
        body.position.y = 0.075; body.castShadow = true;
        laptop.add(body);

        const keyboard = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 1.8), new THREE.MeshStandardMaterial({ map: kbTex, emissive: 0x7090ff, emissiveIntensity: 0.3 }));
        keyboard.rotation.x = -Math.PI/2; keyboard.position.set(0, 0.151, 0.1);
        laptop.add(keyboard);

        const lidPivot = new THREE.Group();
        lidPivot.position.set(0, 0.1, -1.2);
        laptop.add(lidPivot);

        const lid = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 2.4), metalMat);
        lid.position.set(0, 0, 1.2); lid.castShadow = true;
        lidPivot.add(lid);

        const screen = new THREE.Mesh(new THREE.PlaneGeometry(3.3, 2.2), new THREE.MeshStandardMaterial({ map: scrTex, emissive: 0x7090ff, emissiveIntensity: 0.5 }));
        screen.position.set(0, 0.06, 1.2); screen.rotation.x = -Math.PI/2;
        lidPivot.add(screen);
        lidPivot.rotation.x = 1.3;

        scene.add(laptop);

        // ─── Other Hotspots ────────────────────────────────────────────────────────
        // Notebook
        const notebook = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.12, 2.2), new THREE.MeshStandardMaterial({ color: 0x2233aa, roughness: 0.5 }));
        notebook.position.set(2, 0.06, 0.5); notebook.rotation.y = -0.3;
        notebook.userData = { id: 'notebook' };
        scene.add(notebook);

        // Stack of Papers
        const papers = new THREE.Group();
        for(let i=0; i<3; i++) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.01, 1.8), new THREE.MeshStandardMaterial({ color: 0xd0d0d0 }));
            p.position.set(3, 0.01 + i*0.02, -1.5); p.rotation.y = (Math.random()-0.5)*0.2;
            papers.add(p);
        }
        papers.userData = { id: 'papers' };
        scene.add(papers);

        // Smartphone
        const phone = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.06, 1.4), new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.2, metalness: 0.8 }));
        phone.position.set(-1.5, 0.03, 2.2); phone.rotation.y = 0.5;
        phone.userData = { id: 'phone' };
        scene.add(phone);

        // ─── Desk Lamp ─────────────────────────────────────────────────────────────
        const lamp = new THREE.Group();
        lamp.position.set(-5, 0, -2);
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.1, 32), metalMat);
        lamp.add(base);
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2.5), metalMat);
        arm.position.y = 1.25; arm.rotation.z = -0.2;
        lamp.add(arm);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16, 0, Math.PI*2, 0, Math.PI/2), plasticMat);
        head.position.set(0.6, 2.7, 0); head.rotation.z = -2.5;
        lamp.add(head);

        const spot = new THREE.SpotLight(0xfff0dd, 8, 20, Math.PI/4, 0.5, 1);
        spot.position.set(-4.4, 2.7, -2);
        spot.target.position.set(0, 0, 0);
        spot.castShadow = true;
        scene.add(spot);
        scene.add(spot.target);
        scene.add(lamp);

        // ─── Basic Room Lights ─────────────────────────────────────────────────────
        scene.add(new THREE.HemisphereLight(0x6080ff, 0x301828, 2.5));
        const skyLight = new THREE.PointLight(0x9090ff, 4, 60);
        skyLight.position.set(0, 10, 0);
        scene.add(skyLight);
        const fillLight = new THREE.DirectionalLight(0xfff0e0, 1.8);
        fillLight.position.set(3, 8, 5);
        scene.add(fillLight);

        // ─── Interactions ──────────────────────────────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredObj = null;

        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            let target = null;
            for(let i=0; i<intersects.length; i++) {
                let obj = intersects[i].object;
                while(obj) {
                    if(obj.userData && obj.userData.id) { target = obj; break; }
                    obj = obj.parent;
                }
                if(target) break;
            }

            if(target) focusObject(target);
        }

        const infoCard = document.getElementById('info-card');
        const infoTitle = document.getElementById('info-title');
        const infoDesc = document.getElementById('info-desc');
        const viewMore = document.getElementById('view-more');
        const resetBtn = document.getElementById('reset-btn');

        function focusObject(obj) {
            const data = DATA[obj.userData.id];
            infoTitle.textContent = data.title;
            infoDesc.textContent = data.desc;
            viewMore.href = data.url;
            infoCard.classList.add('active');
            resetBtn.classList.add('visible');

            const targetPos = new THREE.Vector3();
            obj.getWorldPosition(targetPos);
            
            new TWEEN.Tween(camera.position)
                .to({ x: targetPos.x, y: targetPos.y + 2, z: targetPos.z + 3.5 }, 1200)
                .easing(TWEEN.Easing.Quadratic.Out)
                .start();
            
            new TWEEN.Tween(controls.target)
                .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1200)
                .easing(TWEEN.Easing.Quadratic.Out)
                .start();
        }

        function resetView() {
            infoCard.classList.remove('active');
            resetBtn.classList.remove('visible');
            new TWEEN.Tween(camera.position).to({ x: 0, y: 5, z: 10 }, 1000).easing(TWEEN.Easing.Quadratic.Out).start();
            new TWEEN.Tween(controls.target).to({ x: 0, y: 0, z: 0 }, 1000).easing(TWEEN.Easing.Quadratic.Out).start();
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);
        resetBtn.addEventListener('click', resetView);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─── Main Loop ─────────────────────────────────────────────────────────────
        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            controls.update();

            // Hover effect
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            let hoverMatch = null;
            for(let i=0; i<intersects.length; i++) {
                let obj = intersects[i].object;
                while(obj) {
                    if(obj.userData && obj.userData.id) { hoverMatch = obj; break; }
                    obj = obj.parent;
                }
                if(hoverMatch) break;
            }

            if(hoverMatch !== hoveredObj) {
                if(hoveredObj) hoveredObj.position.y -= 0.05;
                if(hoverMatch) hoverMatch.position.y += 0.05;
                hoveredObj = hoverMatch;
                document.body.style.cursor = hoverMatch ? 'pointer' : 'default';
            }

            renderer.render(scene, camera); // TEMP TEST: bypass composer
            log('Frame rendered. Cam: ' + camera.position.x.toFixed(1) + ',' + camera.position.y.toFixed(1) + ',' + camera.position.z.toFixed(1));
        }
        log('Starting animate...');
        animate();
    </script>
</body>
</html>
