<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Realistic 3D Demo | Glass & Chrome</title>
    <style>
        body { margin: 0; background: #050508; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 30px; left: 30px; z-index: 100; pointer-events: none;
            max-width: 400px;
        }
        h1 { font-size: 24px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; margin: 0; opacity: 0.9; }
        p { font-size: 13px; opacity: 0.5; line-height: 1.6; margin-top: 10px; }
        #instructions {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.4;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>High-Fidelity Rendering</h1>
        <p>Demonstrating physically-based materials (PBR), refractive transmission, and high-dynamic range reflections in the browser.</p>
    </div>
    <div id="instructions">Drag to Rotate • Scroll to Zoom</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ─── Setup ──────────────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 6);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // ─── Environment (Studio Lighting) ──────────────────────────────────────────
        const envScene = new RoomEnvironment(renderer);
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const envTexture = pmremGenerator.fromScene(envScene).texture;
        scene.environment = envTexture;

        // ─── Post Processing ────────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.8;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.8;
        composer.addPass(bloomPass);

        composer.addPass(new OutputPass());

        // ─── Objects ────────────────────────────────────────────────────────────────

        // 1. Polished Chrome Base
        const baseGeo = new THREE.CylinderGeometry(2, 2, 0.2, 64);
        const chromeMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 1,
            roughness: 0.05,
            clearcoat: 1.0,
            clearcoatRoughness: 0
        });
        const base = new THREE.Mesh(baseGeo, chromeMat);
        base.position.y = -1;
        scene.add(base);

        // 2. Translucent Glass Prism
        const prismGeo = new THREE.IcosahedronGeometry(1.2, 2); 
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0,
            roughness: 0,
            transmission: 1.0,           // Glass effect
            ior: 1.5,                    // Index of Refraction
            reflectivity: 0.5,
            thickness: 2.0,              // Volume thickness
            attenuationColor: 0x88ccee,  // Color absorption
            attenuationDistance: 1.0,
            clearcoat: 1.0
        });
        const prism = new THREE.Mesh(prismGeo, glassMat);
        scene.add(prism);

        // 3. Inner Emissive Core
        const coreGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 10
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        prism.add(core); // Attached to prism for rotation

        // ─── Lighting ───────────────────────────────────────────────────────────────
        const topLight = new THREE.PointLight(0xffffff, 10);
        topLight.position.set(5, 5, 5);
        scene.add(topLight);

        // ─── Animation ─────────────────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            
            const time = performance.now() * 0.001;
            
            // Float the prism
            prism.position.y = Math.sin(time) * 0.15;
            prism.rotation.y += 0.005;
            prism.rotation.x += 0.003;
            
            // Pulse the core
            coreMat.emissiveIntensity = 8 + Math.sin(time * 3) * 6;

            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
