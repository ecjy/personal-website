// Helper: convert click to tablet canvas coordinates when inspecting
function getTabletUV(e) {
    cursor.x = (e.clientX / window.innerWidth) * 2 - 1;
    cursor.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(cursor, camera);
    const hits = raycaster.intersectObject(tabScreen, false);
    if (hits.length > 0) {
        const uv = hits[0].uv;
        return { x: uv.x * tabScrW, y: (1 - uv.y) * tabScrH };
    }
    return null;
}

function resetRecall() {
    if (tabState.recallShowTimer) { clearInterval(tabState.recallShowTimer); tabState.recallShowTimer = null; }
    if (tabState.recallCursorTimer) { clearInterval(tabState.recallCursorTimer); tabState.recallCursorTimer = null; }
    tabState.recallPhase = 'idle';
    tabState.recallInput = '';
    tabState.recallAnswers = [];
    tabState.recallShowIdx = 0;
}

function handleTabletTap(px, py) {
    const W = tabScrW, H = tabScrH;
    if (tabState.currentScreen === 'home') {
        // Check which card was tapped
        const cards = ['recall', 'trail', 'clock'];
        cards.forEach((screen, i) => {
            const cy = 220 + i * 340, ch = 290;
            if (py >= cy && py <= cy + ch && px >= 80 && px <= W - 80) {
                if (screen === 'clock') resetClock();
                tabState.currentScreen = screen;
            }
        });
    } else if (tabState.currentScreen === 'recall') {
        // Back button
        if (py < 124 && px < 160) { resetRecall(); tabState.currentScreen = 'home'; }
        else if (tabState.recallPhase === 'idle') {
            // Begin button
            if (px >= W/2 - 120 && px <= W/2 + 120 && py >= 480 && py <= 540) {
                startRecallShow();
                return; // drawTabletScreen called by startRecallShow
            }
        } else if (tabState.recallPhase === 'input') {
            const answered = tabState.recallAnswers.length;
            const total = MOCA_WORDS.length;

            // Score screen: Next Test button
            if (answered >= total) {
                const kbY = 520;
                if (px >= W/2 - 120 && px <= W/2 + 120 && py >= kbY + 160 && py <= kbY + 214) {
                    resetRecall();
                    tabState.currentScreen = 'trail';
                }
                drawTabletScreen(); return;
            }

            // On-screen keyboard taps
            const kbY = 520;
            const kbRows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
            let keyHit = false;
            kbRows.forEach((row, ri) => {
                const keyW = 80, keyH = 70, gap = 8;
                const rowW = row.length * (keyW + gap) - gap;
                const startX = (W - rowW) / 2;
                const ry = kbY + ri * (keyH + gap);
                for (let ci = 0; ci < row.length; ci++) {
                    const kx = startX + ci * (keyW + gap);
                    if (px >= kx && px <= kx + keyW && py >= ry && py <= ry + keyH) {
                        tabState.recallInput += row[ci];
                        keyHit = true;
                    }
                }
            });

            // Bottom row buttons
            const bry = kbY + 3 * (70 + 8);
            if (py >= bry && py <= bry + 64) {
                if (px >= 60 && px <= 220) {
                    // Backspace
                    tabState.recallInput = tabState.recallInput.slice(0, -1);
                    keyHit = true;
                } else if (px >= 600 && px <= 780 && tabState.recallInput.length > 0) {
                    // Submit / Next
                    tabState.recallAnswers.push(tabState.recallInput);
                    tabState.recallInput = '';
                    keyHit = true;
                }
            }
            if (keyHit) { drawTabletScreen(); return; }
        }
    } else if (tabState.currentScreen === 'trail') {
        // Back button
        if (py < 124 && px < 160) {
            tabState.currentScreen = 'home'; tabState.trailDots = []; tabState.trailConnected = [];
            tabState.trailComplete = false; tabState.trailStartTime = 0;
        }
        // Completion screen — next button
        else if (tabState.trailComplete) {
            const kbY = 680;
            if (px >= W/2 - 130 && px <= W/2 + 130 && py >= kbY && py <= kbY + 54) {
                if (tabState.trailPart === 'A') {
                    // Move to Part B
                    tabState.trailDots = [];
                    tabState.trailConnected = [];
                    tabState.trailComplete = false;
                    tabState.trailStartTime = 0;
                    initTrailDots('B');
                } else {
                    // Move to next test (clock)
                    tabState.trailDots = []; tabState.trailConnected = [];
                    tabState.trailComplete = false; tabState.trailStartTime = 0;
                    resetClock();
                    tabState.currentScreen = 'clock';
                }
            }
        }
        else {
            // Check dot clicks
            const nextIdx = tabState.trailConnected.indexOf(false);

            // Tapping the first dot starts the timer
            if (tabState.trailStartTime === 0) {
                const first = tabState.trailDots[0];
                const dx = px - first.x, dy = py - first.y;
                if (dx*dx + dy*dy < 50*50) {
                    tabState.trailStartTime = Date.now();
                    // Also connect to second if tapped on second
                    const second = tabState.trailDots[1];
                    const dx2 = px - second.x, dy2 = py - second.y;
                    if (dx2*dx2 + dy2*dy2 < 50*50) tabState.trailConnected[0] = true;
                }
            } else if (nextIdx >= 0 && nextIdx < tabState.trailDots.length - 1) {
                const target = tabState.trailDots[nextIdx + 1];
                const dx = px - target.x, dy = py - target.y;
                if (dx*dx + dy*dy < 50*50) {
                    tabState.trailConnected[nextIdx] = true;
                    // Check if all connected
                    if (tabState.trailConnected.every(Boolean)) {
                        tabState.trailComplete = true;
                        tabState.trailEndTime = Date.now();
                    }
                }
            }
        }
    } else if (tabState.currentScreen === 'clock') {
        const phase = tabState.clockPhase;
        const drawTop = 210, drawBot = 1180;
        const trayTop = drawBot + 15;
        if (py < 124 && px < 160) {
            tabState.currentScreen = 'home';
            resetClock();
        } else if (phase === 'draw') {
            const btnY = trayTop;
            if (tabState.clockStrokes.length > 0 && py >= btnY && py <= btnY + 50 && px >= W/2 - 230 && px <= W/2 - 110) {
                tabState.clockStrokes = [];
            } else if (tabState.clockStrokes.length > 0 && py >= btnY && py <= btnY + 50 && px >= W/2 - 90 && px <= W/2 + 30) {
                tabState.clockStrokes.pop();
            } else if (tabState.clockStrokes.length > 0 && py >= btnY && py <= btnY + 50 && px >= W/2 + 50 && px <= W/2 + 230) {
                // Next → move to numbers phase
                tabState._circleStrokeCount = tabState.clockStrokes.length;
                tabState.clockPhase = 'numbers';
            } else if (py >= drawTop && py <= drawBot && px >= 40 && px <= W - 40) {
                tabState.clockIsDrawing = true;
                tabState.clockCurrentStroke = [{ x: px, y: py }];
            }
        } else if (phase === 'numbers') {
            const tray = tabState.clockTrayNums;
            const tileSize = 62, tilePad = 8;
            const totalW = tray.length * (tileSize + tilePad) - tilePad;
            const startX = Math.max(50, (W - totalW) / 2);

            // Check "Draw Hands →" button (when all placed)
            if (tray.length === 0 && py >= trayTop + 10 && py <= trayTop + 64 && px >= W/2 - 120 && px <= W/2 + 120) {
                tabState.clockPhase = 'hands';
            }
            // Check "Reset" button
            else if (tabState.clockPlacedNums.length > 0 && tray.length > 0 && py >= trayTop + 80 && py <= trayTop + 120 && px >= W - 140 && px <= W - 40) {
                // Return all placed numbers to tray
                for (const n of tabState.clockPlacedNums) tabState.clockTrayNums.push(n.num);
                tabState.clockPlacedNums = [];
            }
            // Check tray tile tap → start dragging
            else if (py >= trayTop + 10 && py <= trayTop + 10 + tileSize) {
                for (let i = 0; i < tray.length; i++) {
                    const tx = startX + i * (tileSize + tilePad);
                    if (px >= tx && px <= tx + tileSize) {
                        tabState.clockDragging = { num: tray[i], x: px, y: py, trayIdx: i };
                        break;
                    }
                }
            }
        } else if (phase === 'hands') {
            const btnY = trayTop;
            // Undo hand stroke
            if (tabState.clockStrokes.length > tabState._circleStrokeCount && py >= btnY && py <= btnY + 50 && px >= W/2 - 190 && px <= W/2 - 70) {
                tabState.clockStrokes.pop();
            }
            // Score button
            else if (tabState.clockStrokes.length > tabState._circleStrokeCount && py >= btnY && py <= btnY + 50 && px >= W/2 + 10 && px <= W/2 + 190) {
                scoreClockDrawing();
                tabState.clockPhase = 'score';
            }
            // Freehand drawing for hands
            else if (py >= drawTop && py <= drawBot && px >= 40 && px <= W - 40) {
                tabState.clockIsDrawing = true;
                tabState.clockCurrentStroke = [{ x: px, y: py }];
            }
        } else if (phase === 'score') {
            if (py >= 790 && py <= 840 && px >= W/2 - 100 && px <= W/2 + 100) {
                resetClock();
            }
        }
    }
    drawTabletScreen();
}

// Physical keyboard input for tablet recall
window.addEventListener('keydown', (e) => {
    if (!isInspectingTablet || tabState.currentScreen !== 'recall' || tabState.recallPhase !== 'input') return;
    if (tabState.recallAnswers.length >= MOCA_WORDS.length) return;

    if (e.key === 'Backspace') {
        tabState.recallInput = tabState.recallInput.slice(0, -1);
        drawTabletScreen();
    } else if (e.key === 'Enter' && tabState.recallInput.length > 0) {
        tabState.recallAnswers.push(tabState.recallInput);
        tabState.recallInput = '';
        drawTabletScreen();
    } else if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
        tabState.recallInput += e.key.toUpperCase();
        drawTabletScreen();
    }
});

const defaultSubtitle = "Elecctro-style 3D replica — Click monitor, card, tablet, or folder stack";

window.addEventListener('mousedown', (e) => {
    cursor.x = (e.clientX / window.innerWidth) * 2 - 1;
    cursor.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(cursor, camera);

    const intersectsMonitor = raycaster.intersectObjects([face, bezel, innerScreen], false);
    const intersectsCard = raycaster.intersectObjects([hitBox], false);
    const intersectsTablet = raycaster.intersectObjects([tabHitBox], false);
    const intersectsCoffee = raycaster.intersectObjects([coffeeHitBox], false);
    const intersectsBooks = raycaster.intersectObjects(bookMeshes, false);
    const intersectsFolders = raycaster.intersectObjects(folderHitboxes, false);

    // ── Folder interactions ──────────────────────────────────────────────
    // Dismiss folder inspect on click outside
    if (isInspectingFolder && intersectsFolders.length === 0) {
        // Close folder and reader
        var iF = folders[inspectedFolderIdx];
        if (iF) { iF.isOpen = false; iF.flapTarget = 0; iF.flipPhase = 0; iF.paperCycleT = 0; }
        pubReader.classList.add('hidden');
        isInspectingFolder = false;
        isDraggingFolder = false;
        exitFolderSelectMode(inspectedFolderIdx);
        inspectedFolderIdx = -1;
        document.getElementById('subtitle').innerText = defaultSubtitle;
        return;
    }
    // Dismiss fan-out selection on click outside
    if (folderSelectMode && !isInspectingFolder && intersectsFolders.length === 0) {
        exitFolderSelectMode(-1);
        document.getElementById('subtitle').innerText = defaultSubtitle;
        return;
    }
    // Click folder stack (not in select mode, not inspecting anything else)
    if (intersectsFolders.length > 0 && !folderSelectMode && !isInspectingFolder &&
        !isInspectingCard && !isInspectingTablet && !isInspectingCoffee && !isInspectingBook && !isZoomed) {
        enterFolderSelectMode();
        return;
    }
    // Click folder in fan-out mode -> inspect it
    if (folderSelectMode && !isInspectingFolder && intersectsFolders.length > 0) {
        var hitHitbox = intersectsFolders[0].object;
        var hitFolderIdx = -1;
        folders.forEach(function(f, fi) { if (f.hitbox === hitHitbox) hitFolderIdx = fi; });
        if (hitFolderIdx >= 0) {
            inspectedFolderIdx = hitFolderIdx;
            isInspectingFolder = true;
            folderSelectMode = false;
            var fld = folders[hitFolderIdx];
            fld.ensureTextures();
            // Position in front of camera, folder facing user
            var camFwdF = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            var worldPosF = camera.position.clone().add(camFwdF.multiplyScalar(7.0));
            folderInspectPos.copy(folderStackGroup.worldToLocal(worldPosF.clone()));
            // Compute rotation so folder faces camera (same as fan-out)
            var cQ = new THREE.Quaternion().setFromEuler(camera.rotation);
            var tQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI / 2);
            cQ.multiply(tQ);
            var wIQ = new THREE.Quaternion().copy(folderStackGroup.getWorldQuaternion(new THREE.Quaternion())).invert();
            cQ.premultiply(wIQ);
            folderInspectRot.setFromQuaternion(cQ);
            fld.targetPos.copy(folderInspectPos);
            fld.targetRot.copy(folderInspectRot);
            // Dismiss other folders back to rest
            folders.forEach(function(ff, fi) {
                if (fi !== hitFolderIdx) { ff.targetPos.copy(ff.restingPos); ff.targetRot.copy(ff.restingRot); }
            });
            document.getElementById('subtitle').innerText = fld.config.label + ' (' + fld.config.papers.length + ' papers). Double-click to open.';
        }
        return;
    }
    // Drag inspected folder
    if (isInspectingFolder && intersectsFolders.length > 0) {
        isDraggingFolder = true;
        return;
    }

    // Dismiss book on click outside
    if (isInspectingBook && intersectsBooks.length === 0) {
        cycleBookToEnd(inspectedBookIdx);
        isInspectingBook = false;
        bookTargetOpen = 0;
        inspectedBookIdx = -1;
        document.getElementById('subtitle').innerText = defaultSubtitle;
        return;
    }

    // Dismiss coffee on click outside
    if (isInspectingCoffee && intersectsCoffee.length === 0) {
        isInspectingCoffee = false;
        document.getElementById('subtitle').innerText = defaultSubtitle;
        return;
    }

    // If tablet is being inspected, check for screen interaction first
    if (isInspectingTablet) {
        const uv = getTabletUV(e);
        if (uv) {
            handleTabletTap(uv.x, uv.y);
            return;
        }
        // Clicked outside tablet — dismiss
        isInspectingTablet = false;
        document.getElementById('subtitle').innerText = defaultSubtitle;
        return;
    }

    if (intersectsTablet.length > 0 && !isInspectingCard && !isInspectingCoffee && !isInspectingBook && !isZoomed) {
        isInspectingTablet = true;
        document.getElementById('subtitle').innerText = "Tap the screen to interact. Click outside to dismiss.";
        const camFwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        const worldPos = camera.position.clone().add(camFwd.multiplyScalar(4.5));
        tabInspectPos.copy(workstation.worldToLocal(worldPos.clone()));
        // Rotate so screen faces camera, accounting for workstation rotation
        const camQ = new THREE.Quaternion().setFromEuler(camera.rotation);
        const tiltQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), Math.PI/2);
        camQ.multiply(tiltQ);
        // Convert to workstation local space
        const wsInvQ = new THREE.Quaternion().copy(workstation.quaternion).invert();
        camQ.premultiply(wsInvQ);
        tabInspectRot.setFromQuaternion(camQ);
        return;
    }

    if (intersectsBooks.length > 0 && !isInspectingCard && !isInspectingTablet && !isInspectingCoffee && !isZoomed) {
        const hitBook = intersectsBooks[0].object;
        const hitIdx = getBookIndexFromMesh(hitBook);
        if (hitIdx === -1) return;
        if (!isInspectingBook) {
            isInspectingBook = true;
            inspectedBookIdx = hitIdx;
            bookTargetOpen = 0; // keep closed — admire cover first
            bookOpenAmount = 0;
            const bDef = bookDefs[hitIdx];
            document.getElementById('subtitle').innerText = '"' + bDef.title + '" by ' + bDef.author + ' — Drag to rotate. Double-click to open.';
            const camFwdB = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const worldPosB = camera.position.clone().add(camFwdB.multiplyScalar(5.0));
            bookInspectPos.copy(bookRackGroup.worldToLocal(worldPosB.clone()));
            // Spine on the left, cover facing camera
            bookInspectRot.set(0, -Math.PI / 2, 0);
        } else if (hitIdx === inspectedBookIdx) {
            isDraggingBook = true;
        } else {
            // Switch to a different book — cycle old one to end
            cycleBookToEnd(inspectedBookIdx);
            bookTargetOpen = 0;
            bookOpenAmount = 0;
            inspectedBookIdx = hitIdx;
            const bDef = bookDefs[hitIdx];
            document.getElementById('subtitle').innerText = '"' + bDef.title + '" by ' + bDef.author + ' — Drag to rotate. Double-click to open.';
            bookInspectRot.set(0, -Math.PI / 2, 0);
        }
        return;
    }

    if (intersectsCoffee.length > 0 && !isInspectingCard && !isInspectingTablet && !isInspectingBook && !isZoomed) {
        if (!isInspectingCoffee) {
            isInspectingCoffee = true;
            document.getElementById('subtitle').innerText = "Drag to rotate. Click outside to dismiss.";
            // Compute inspect position in workstation local space
            const camFwd3 = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const worldPos3 = camera.position.clone().add(camFwd3.multiplyScalar(5.5));
            coffeeInspectPos.copy(workstation.worldToLocal(worldPos3.clone()));
            // Keep logo facing front (Y=PI), slight tilt toward camera
            coffeeInspectRot.set(-0.15, Math.PI, 0);
        } else {
            isDraggingCoffee = true;
        }
        return;
    }

    if (intersectsCard.length > 0) {
        if (!isInspectingCard) {
            isInspectingCard = true;
            isZoomed = false;
            isInspectingTablet = false;
            document.getElementById('subtitle').innerText = "Drag to rotate the ID card. Click outside to dismiss.";
            const camFwd2 = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const worldPos2 = camera.position.clone().add(camFwd2.multiplyScalar(6.5));
            cardInspectPos.copy(workstation.worldToLocal(worldPos2.clone()));
            // Convert camera rotation to workstation local space
            const cardQ = new THREE.Quaternion().setFromEuler(camera.rotation);
            const wsInvQ2 = new THREE.Quaternion().copy(workstation.quaternion).invert();
            cardQ.premultiply(wsInvQ2);
            cardInspectRot.setFromQuaternion(cardQ);
        } else {
            isDraggingCard = true;
        }
    } else if (intersectsMonitor.length > 0) {
        if (!isInspectingCard) {
            if (isZoomed) {
                // Check if click is on a tab
                const hit = intersectsMonitor.find(h => h.object === face);
                if (hit && hit.uv) {
                    const ux = hit.uv.x * 2048, uy = (1 - hit.uv.y) * 1024;
                    // Tab bar is top 68px
                    if (uy < 68) {
                        for (let ti = 0; ti < tabDefs.length; ti++) {
                            const tx0 = 16 + ti * (monitorTabW * 2 + monitorTabGap * 2);
                            if (ux >= tx0 && ux <= tx0 + monitorTabW * 2) {
                                if (tabDefs[ti].external) {
                                    window.open('https://' + tabDefs[ti].url, '_blank');
                                } else {
                                    monitorActiveTab = ti;
                                    drawMonitorScreen();
                                    screenTex.needsUpdate = true;
                                }
                                break;
                            }
                        }
                        // Stay zoomed, don't toggle
                    } else {
                        isZoomed = false;
                        document.getElementById('subtitle').innerText = defaultSubtitle;
                    }
                } else {
                    isZoomed = false;
                    document.getElementById('subtitle').innerText = defaultSubtitle;
                }
            } else {
                isZoomed = true;
                document.getElementById('subtitle').innerText = "Click tabs to switch. Click below to zoom out.";
            }
        }
    } else {
        if (isZoomed) { isZoomed = false; document.getElementById('subtitle').innerText = defaultSubtitle; }
        else if (isInspectingCard) { isInspectingCard = false; document.getElementById('subtitle').innerText = defaultSubtitle; }
        else { isDraggingWorkstation = true; }
    }
});

window.addEventListener('mousemove', (e) => {
    // Freehand drawing on clock tablet (draw phase + hands phase)
    if (tabState.clockIsDrawing && isInspectingTablet && tabState.currentScreen === 'clock' && (tabState.clockPhase === 'draw' || tabState.clockPhase === 'hands')) {
        const uv = getTabletUV(e);
        if (uv && tabState.clockCurrentStroke) {
            tabState.clockCurrentStroke.push({ x: uv.x, y: uv.y });
            drawTabletScreen();
            if (tabScrTex) tabScrTex.needsUpdate = true;
        }
    }
    // Drag number on clock tablet
    if (tabState.clockDragging && isInspectingTablet && tabState.currentScreen === 'clock' && tabState.clockPhase === 'numbers') {
        const uv = getTabletUV(e);
        if (uv) {
            tabState.clockDragging.x = uv.x;
            tabState.clockDragging.y = uv.y;
            drawTabletScreen();
            if (tabScrTex) tabScrTex.needsUpdate = true;
        }
    }
    if (isDraggingCard && isInspectingCard) {
        const deltaMove = {
            x: e.offsetX - previousMousePosition.x,
            y: e.offsetY - previousMousePosition.y
        };
        cardInspectRot.y += deltaMove.x * 0.01;
        cardInspectRot.x += deltaMove.y * 0.01;
    }
    if (isDraggingBook && isInspectingBook) {
        const dbm = {
            x: e.offsetX - previousMousePosition.x,
            y: e.offsetY - previousMousePosition.y
        };
        bookInspectRot.y += dbm.x * 0.01;
        bookInspectRot.x += dbm.y * 0.01;
    }
    // folder drag rotation disabled
    if (isDraggingCoffee && isInspectingCoffee) {
        const dm = {
            x: e.offsetX - previousMousePosition.x,
            y: e.offsetY - previousMousePosition.y
        };
        coffeeInspectRot.y += dm.x * 0.01;
        coffeeInspectRot.x += dm.y * 0.01;
    }
    if (isDraggingWorkstation) {
        const dx = e.offsetX - previousMousePosition.x;
        workstation.rotation.y += dx * 0.005;
    }
    previousMousePosition = { x: e.offsetX, y: e.offsetY };
});

window.addEventListener('mouseup', () => {
    // Finish freehand stroke on clock
    if (tabState.clockIsDrawing && tabState.clockCurrentStroke && tabState.clockCurrentStroke.length > 1) {
        tabState.clockStrokes.push(tabState.clockCurrentStroke);
    }
    tabState.clockIsDrawing = false;
    tabState.clockCurrentStroke = null;
    // Drop dragged number onto clock face
    if (tabState.clockDragging) {
        const d = tabState.clockDragging;
        const drawTop = 210, drawBot = 1180;
        // Only place if dropped within the drawing area
        if (d.x >= 40 && d.x <= tabScrW - 40 && d.y >= drawTop && d.y <= drawBot) {
            tabState.clockPlacedNums.push({ num: d.num, x: d.x, y: d.y });
            tabState.clockTrayNums.splice(tabState.clockTrayNums.indexOf(d.num), 1);
        }
        tabState.clockDragging = null;
        drawTabletScreen();
    }
    isDraggingCard = false;
    isDraggingCoffee = false;
    isDraggingBook = false;
    isDraggingFolder = false;
    isDraggingWorkstation = false;
});

// Double-click to open book
window.addEventListener('dblclick', (e) => {
    // ── Folder double-click: open cover and show reader ──
    if (isInspectingFolder && inspectedFolderIdx >= 0) {
        const fMouse = new THREE.Vector2(
            (e.clientX / window.innerWidth) * 2 - 1,
            -(e.clientY / window.innerHeight) * 2 + 1
        );
        raycaster.setFromCamera(fMouse, camera);
        const fHits = raycaster.intersectObjects(folderHitboxes, false);
        if (fHits.length > 0) {
            var fld = folders[inspectedFolderIdx];
            if (!fld.isOpen) {
                // Open folder
                fld.isOpen = true;
                fld.flapTarget = 2.2;
                fld.curPage = 0;
                fld.flipPhase = 0;
                fld.paperCycleT = 0;
                populateReader(fld.config.papers);
                pubReader.classList.remove('hidden');
                document.getElementById('subtitle').innerText = fld.config.label + ' — browsing papers. Click outside to close.';
            } else {
                // Close folder
                fld.isOpen = false;
                fld.flapTarget = 0;
                fld.flipPhase = 0;
                pubReader.classList.add('hidden');
                document.getElementById('subtitle').innerText = fld.config.label + '. Double-click to open.';
            }
            return;
        }
    }

    if (!isInspectingBook || inspectedBookIdx < 0) return;
    const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
    );
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(bookMeshes, false);
    if (hits.length > 0) {
        const hitIdx = getBookIndexFromMesh(hits[0].object);
        if (hitIdx === inspectedBookIdx) {
            bookTargetOpen = bookTargetOpen > 0 ? 0 : 1; // toggle open/close
        }
    }
});

// Add instruction initial text
document.getElementById('subtitle').innerText = defaultSubtitle;

// ─── Animation loop ──────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    
    // Smoothly interpolate the camera position and target
    const targetPos = isZoomed ? zoomCamPos : defaultCamPos;
    const targetLook = isZoomed ? zoomCamTarget : defaultCamTarget;
    
    currentCamPos.lerp(targetPos, 0.08);
    currentTarget.lerp(targetLook, 0.08);
    
    camera.position.copy(currentCamPos);
    camera.lookAt(currentTarget);

    // Animate the Staff Card
    if (isInspectingCard) {
        cardGroup.position.lerp(cardInspectPos, 0.08);
        const currentQ = new THREE.Quaternion().copy(cardGroup.quaternion);
        const targetQ = new THREE.Quaternion().setFromEuler(cardInspectRot);
        currentQ.slerp(targetQ, 0.08);
        cardGroup.quaternion.copy(currentQ);
    } else {
        cardGroup.position.lerp(cardRestingPos, 0.08);
        const currentQ = new THREE.Quaternion().copy(cardGroup.quaternion);
        const targetQ = new THREE.Quaternion().setFromEuler(cardRestingRot);
        currentQ.slerp(targetQ, 0.08);
        cardGroup.quaternion.copy(currentQ);
        cardInspectRot.set(-0.2, 0, 0);
    }

    // Animate the Tablet
    {
        const tPos = isInspectingTablet ? tabInspectPos : tabRestingPos;
        const tRot = isInspectingTablet ? tabInspectRot : tabRestingRot;
        tabletGroup.position.lerp(tPos, 0.08);
        const tq = new THREE.Quaternion().copy(tabletGroup.quaternion);
        const ttq = new THREE.Quaternion().setFromEuler(tRot);
        tq.slerp(ttq, 0.08);
        tabletGroup.quaternion.copy(tq);
        if (!isInspectingTablet) tabInspectRot.set(-0.2, 0, 0);
    }

    // Animate the Coffee Cup
    {
        const cPos = isInspectingCoffee ? coffeeInspectPos : coffeeRestingPos;
        const cRot = isInspectingCoffee ? coffeeInspectRot : coffeeRestingRot;
        coffeeGroup.position.lerp(cPos, 0.08);
        const cq = new THREE.Quaternion().copy(coffeeGroup.quaternion);
        const ctq = new THREE.Quaternion().setFromEuler(cRot);
        cq.slerp(ctq, 0.08);
        coffeeGroup.quaternion.copy(cq);
        if (!isInspectingCoffee) coffeeInspectRot.set(-0.15, Math.PI, 0);
    }

    // Animate Books — position/rotation for the group, cover open/close
    bookGroups.forEach((bg, i) => {
        if (isInspectingBook && i === inspectedBookIdx) {
            bg.position.lerp(bookInspectPos, 0.08);
            const bq = new THREE.Quaternion().copy(bg.quaternion);
            const btq = new THREE.Quaternion().setFromEuler(bookInspectRot);
            bq.slerp(btq, 0.08);
            bg.quaternion.copy(bq);
        } else {
            bg.position.lerp(bookRestingPositions[i], 0.08);
            const bq = new THREE.Quaternion().copy(bg.quaternion);
            const btq = new THREE.Quaternion().setFromEuler(bookRestingRotations[i]);
            bq.slerp(btq, 0.08);
            bg.quaternion.copy(bq);
        }
    });
    // Animate book cover opening/closing
    bookOpenAmount += (bookTargetOpen - bookOpenAmount) * 0.06;
    if (inspectedBookIdx >= 0 && inspectedBookIdx < bookFrontCovers.length) {
        // Rotate front cover pivot: 0 = closed, target = -PI*0.75 (open ~135°)
        bookFrontCovers[inspectedBookIdx].rotation.y = -bookOpenAmount * Math.PI * 0.75;
    }
    // Close all other covers
    bookFrontCovers.forEach((fc, i) => {
        if (i !== inspectedBookIdx) {
            fc.rotation.y += (0 - fc.rotation.y) * 0.08;
        }
    });

    // ── Animate Folders ─────────────────────────────────────────────────────
    folders.forEach(function(f, i) {
        // Position/rotation lerp
        f.group.position.lerp(f.targetPos, 0.08);
        var fq = new THREE.Quaternion().copy(f.group.quaternion);
        var ftq = new THREE.Quaternion().setFromEuler(f.targetRot);
        fq.slerp(ftq, 0.08);
        f.group.quaternion.copy(fq);

        // Cover open animation
        f.flapAngle += (f.flapTarget - f.flapAngle) * 0.065;
        f.flapPivot.rotation.z = f.flapAngle;

        // Paper edge visibility
        var edgesVis = f.flapAngle > 0.5;
        f.paperEdges.forEach(function(e) { e.visible = edgesVis; });
        f.paperBase.visible = edgesVis && f.flipPhase === 1;
        f.paperTop.visible = edgesVis && f.flipPhase === 0;

        // Page flip animation
        var easeInOut = function(x) { return 0.5 - 0.5 * Math.cos(x * Math.PI); };
        var readerOpen = !pubReader.classList.contains('hidden');
        if (f.flipPhase === 1 && !readerOpen) {
            f.flipProgress = Math.min(1, f.flipProgress + 1 / FOLDER_FLIP_FRAMES);
            var ez = easeInOut(f.flipProgress);
            f.flipPivot.rotation.z = ez * FOLDER_FLIP_END;
            f.flipPivot.rotation.x = Math.sin(ez * Math.PI) * 0.12;
            if (f.flipProgress >= 1) {
                f.flipPivot.rotation.z = 0; f.flipPivot.rotation.x = 0; f.flipPivot.visible = false;
                f.curPage = f.flipNext;
                if (f.paperTextures[f.curPage]) {
                    f.paperTop.material.map = f.paperTextures[f.curPage]; f.paperTop.material.needsUpdate = true;
                }
                var nextP = (f.curPage + 1) % f.config.papers.length;
                if (f.paperTextures[nextP]) {
                    f.paperBase.material.map = f.paperTextures[nextP]; f.paperBase.material.needsUpdate = true;
                }
                f.flipProgress = 0; f.flipPhase = 0;
            }
        }

        // Auto-cycle when open, idle, reader closed
        if (edgesVis && f.flipPhase === 0 && !readerOpen && isInspectingFolder && i === inspectedFolderIdx) {
            f.paperCycleT += 0.011;
            if (f.paperCycleT >= 3.0) {
                f.paperCycleT = 0;
                f.flipNext = (f.curPage + 1) % f.config.papers.length;
                if (f.paperTextures[f.curPage]) {
                    f.flipTop.material.map = f.paperTextures[f.curPage]; f.flipTop.material.needsUpdate = true;
                }
                f.flipPivot.rotation.z = 0; f.flipPivot.rotation.x = 0; f.flipPivot.visible = true;
                f.flipPhase = 1; f.flipProgress = 0;
            }
        } else if (!edgesVis) {
            f.flipPivot.visible = false; f.flipPivot.rotation.z = 0; f.flipPivot.rotation.x = 0;
            f.paperCycleT = 0; f.flipPhase = 0; f.flipProgress = 0;
            f.curPage = 0;
            if (f.paperTextures.length > 0) {
                f.paperTop.material.map = f.paperTextures[0]; f.paperTop.material.needsUpdate = true;
                if (f.paperTextures.length > 1) { f.paperBase.material.map = f.paperTextures[1]; f.paperBase.material.needsUpdate = true; }
            }
        }
    });

    // Live timer refresh for TMT
    if (isInspectingTablet && tabState.currentScreen === 'trail' && tabState.trailStartTime > 0 && !tabState.trailComplete) {
        drawTabletScreen();
    }

    renderer.render(scene, camera);
}
animate();

// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
